# Habilitar Display OLED
CONFIG_ZMK_DISPLAY=y

# Habilitar Encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Habilitar sono profundo para economizar bateria
CONFIG_ZMK_SLEEP=y

# Habilitar ZMK Studio (TEMPORARIAMENTE DESATIVADO PARA NÃO CONFLITAR COM O LOG SERIAL)
# CONFIG_ZMK_STUDIO=y
# CONFIG_ZMK_STUDIO_LOCKING=n

# Habilitar USB Logging (Debug pelo console serial USB)
CONFIG_ZMK_USB_LOGGING=y
