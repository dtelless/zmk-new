# Habilitar Display OLED
CONFIG_ZMK_DISPLAY=y

# Habilitar Encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Habilitar RGB Underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Por padrão, alternar o RGB liga/desliga a energia externa (ext_power),
# o que também desliga a tela OLED. Se quiser que a tela continue ligada
# mesmo com o RGB desligado, descomente a linha abaixo:
# CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# Habilitar sono profundo para economizar bateria
CONFIG_ZMK_SLEEP=y
