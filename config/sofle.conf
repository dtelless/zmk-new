# --- ATIVAÇÃO DA TELA OLED ---
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILTIN=y

# --- ATIVAÇÃO DOS LEDS (RGB Underglow e Per-Key) ---
CONFIG_ZMK_RGB_UNDERGLOW=y
# Permite controlar a iluminação por tecla (Per-Key) se o hardware suportar
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=0
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=10

# --- GERENCIAMENTO DE ENERGIA (Essencial para Bateria) ---
# Desliga os LEDs automaticamente após 15 minutos de inatividade
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
# Desliga os LEDs quando o teclado entrar em suspensão profunda
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=n
CONFIG_ZMK_STUDIO=y
